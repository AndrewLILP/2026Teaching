<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAS Department Purchasing System</title>
  <meta name="description"
        content="TAS Department Purchase Request Management — NSW Computing Technology Stage 5 exemplar">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- SheetJS (Excel export) -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       LOGIN SCREEN
       Role switcher pattern: no real auth — simulates three roles
       for demonstration purposes (teacher / admin / HoD).
       [GRADE A — Demonstrates creativity and innovation in UI
        design: card-based role selection avoids a generic form]
  ══════════════════════════════════════════════════════════ -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <span class="brand-mark">TAS</span>
        <div>
          <h1 class="login-title">Purchasing System</h1>
          <p class="login-sub">Technology & Applied Studies Department</p>
        </div>
      </div>

      <p class="login-prompt">Sign in as:</p>

      <div class="role-grid">
        <button class="login-btn role-card" data-role="teacher">
          <span class="role-icon">✏</span>
          <span class="role-name">Teacher</span>
          <span class="role-desc">Submit &amp; track requests</span>
        </button>
        <button class="login-btn role-card" data-role="admin">
          <span class="role-icon">📋</span>
          <span class="role-name">Admin</span>
          <span class="role-desc">View &amp; track all requests</span>
        </button>
        <button class="login-btn role-card" data-role="hod">
          <span class="role-icon">✓</span>
          <span class="role-name">Head of Department</span>
          <span class="role-desc">Approve, reject &amp; export</span>
        </button>
      </div>

      <p class="login-footer">
        NSW Computing Technology 7–10 &middot; Stage 5 Grade A Exemplar
      </p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       APP SHELL (hidden until login)
  ══════════════════════════════════════════════════════════ -->
  <div id="app-shell" class="app-shell" hidden>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-mark brand-mark--sm">TAS</span>
        <div class="sidebar-brand-text">
          <span class="sidebar-title">Purchasing</span>
          <span class="sidebar-sub">Department System</span>
        </div>
      </div>

      <div class="sidebar-user-info">
        <span class="sidebar-user" id="sidebar-user">—</span>
        <span class="sidebar-role-badge" id="sidebar-role">—</span>
      </div>

      <nav class="sidebar-nav">
        <ul id="sidebar-nav"></ul>
      </nav>

      <div class="sidebar-footer">
        <button id="logout-btn" class="btn btn--ghost btn--sm sidebar-logout">
          ← Sign out
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <div id="tab-content" class="tab-content"></div>
    </main>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       MODAL OVERLAY
       Used for request detail views (teacher read-only + HoD
       line-by-line approval controls).
  ══════════════════════════════════════════════════════════ -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-label="Request Detail">
    <div class="modal-panel">
      <button id="modal-close-btn" class="modal-close" aria-label="Close">&times;</button>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- ══════════════════════════════════════════════════════════
       SCRIPTS — load order matters:
       data → state → ui → forms → charts → hod → export → app
       [GRADE A — Systems thinking: dependency order is explicit
        and documented; each module depends only on earlier ones]
  ══════════════════════════════════════════════════════════ -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/hod.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
