<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths — Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:  #F4EFE9;
  --ink:    #1C1F30;
  --mid:    rgba(28,31,48,0.18);
  --rule-h: 7px;
}

html, body {
  height: 100%;
}

body {
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
  gap: 72px;
  padding: 60px 24px;
}

/* ── hero logo ── */
.logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: default;
  user-select: none;
}

.mark {
  display: flex;
  flex-direction: column;
  align-items: stretch;
}

.heart {
  display: flex;
  align-items: flex-end;
}

.d {
  display: inline-block;
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  color: var(--ink);
  line-height: 0.82;
}

/* push the pair together */
.d:first-child { margin-right: -0.025em; }

.d-flip { transform: scaleX(-1); }

.rule {
  height: var(--rule-h);
  background: var(--ink);
  border-radius: calc(var(--rule-h) / 2);
  margin-top: 6px;
}

.wordmark {
  font-family: 'Nunito', sans-serif;
  font-weight: 300;
  text-transform: uppercase;
  letter-spacing: 0.58em;
  color: var(--ink);
  /* optical: compensate for trailing letter-spacing gap */
  padding-left: 0.58em;
}

/* ── size tokens ── */
.logo--xl .d        { font-size: 200px; }
.logo--xl .wordmark { font-size: 28px; margin-top: 18px; }

.logo--md .d        { font-size: 100px; }
.logo--md .rule     { height: 4px; border-radius: 2px; margin-top: 3px; }
.logo--md .wordmark { font-size: 15px; letter-spacing: 0.5em; padding-left: 0.5em; margin-top: 10px; }

.logo--sm .d        { font-size: 54px; }
.logo--sm .rule     { height: 3px; border-radius: 1.5px; margin-top: 2px; }
.logo--sm .wordmark { font-size: 9px; letter-spacing: 0.45em; padding-left: 0.45em; margin-top: 7px; }

/* ── heartbeat on hover ── */
.logo .mark {
  transition: transform 0.15s ease;
  transform-origin: center bottom;
}
.logo:hover .mark { animation: beat 0.55s ease forwards; }

@keyframes beat {
  0%   { transform: scale(1); }
  28%  { transform: scale(1.06); }
  55%  { transform: scale(0.975); }
  78%  { transform: scale(1.025); }
  100% { transform: scale(1); }
}

/* ── scale specimens ── */
.specimens {
  display: flex;
  align-items: flex-end;
  gap: 48px;
  flex-wrap: wrap;
  justify-content: center;
}

.specimen-label {
  text-align: center;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mid);
  margin-top: 20px;
  color: rgba(28,31,48,0.35);
}

/* ── dark swatch ── */
.swatch {
  background: var(--ink);
  border-radius: 20px;
  padding: 44px 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.swatch .d       { color: var(--cream); }
.swatch .rule    { background: var(--cream); }
.swatch .wordmark { color: var(--cream); }

/* ── divider ── */
.divider {
  width: 1px;
  height: 48px;
  background: var(--mid);
}
</style>
</head>
<body>

  <!-- HERO ─────────────────────────────────────── -->
  <div class="logo logo--xl" title="Hover me">
    <div class="mark">
      <div class="heart">
        <span class="d d-flip">2</span><span class="d">2</span>
      </div>
      <div class="rule"></div>
    </div>
    <div class="wordmark">Maths</div>
  </div>

  <div class="divider"></div>

  <!-- SCALE SPECIMENS ──────────────────────────── -->
  <div class="specimens">

    <!-- dark card medium -->
    <div>
      <div class="swatch">
        <div class="logo logo--md">
          <div class="mark">
            <div class="heart">
              <span class="d">2</span><span class="d d-flip">2</span>
            </div>
            <div class="rule"></div>
          </div>
          <div class="wordmark">Maths</div>
        </div>
      </div>
      <div class="specimen-label">Dark · Medium</div>
    </div>

    <!-- light medium -->
    <div>
      <div class="logo logo--md">
        <div class="mark">
          <div class="heart">
            <span class="d">2</span><span class="d d-flip">2</span>
          </div>
          <div class="rule"></div>
        </div>
        <div class="wordmark">Maths</div>
      </div>
      <div class="specimen-label">Light · Medium</div>
    </div>

    <!-- light small -->
    <div>
      <div class="logo logo--sm">
        <div class="mark">
          <div class="heart">
            <span class="d">2</span><span class="d d-flip">2</span>
          </div>
          <div class="rule"></div>
        </div>
        <div class="wordmark">Maths</div>
      </div>
      <div class="specimen-label">Light · Small</div>
    </div>

  </div>

</body>
</html>
