<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Novel Flowchart</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2c3e50, #4ca1af);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
}

.box {
    background: white;
    padding: 20px 30px;
    border-radius: 12px;
    text-align: center;
    width: min(300px, 80vw);
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    font-weight: bold;
}

.decision {
    background: #ffeaa7;
    transform: rotate(45deg);
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.decision span {
    transform: rotate(-45deg);
    font-weight: bold;
    text-align: center;
}

.arrow {
    width: 2px;
    height: 40px;
    background: white;
}

.row {
    display: flex;
    gap: 40px;
    align-items: center;
}

.horizontal-arrow {
    height: 2px;
    width: 60px;
    background: white;
}

.label {
    font-size: 14px;
    color: white;
    margin-top: -25px;
}
</style>
</head>

<body>

<div class="container">

    <div class="box">User Opens Page</div>
    <div class="arrow"></div>

    <div class="box">First Dialogue Line Loads</div>
    <div class="arrow"></div>

    <div class="decision">
        <span>Is Text<br>Still Typing?</span>
    </div>

    <div class="row">
        <div>
            <div class="arrow"></div>
            <div class="label">YES</div>
            <div class="box">Finish Text Instantly</div>
            <div class="arrow"></div>
            <div class="box">Wait for Next Click</div>
        </div>

        <div>
            <div class="horizontal-arrow"></div>
        </div>

        <div>
            <div class="label">NO</div>
            <div class="box">Load Next Dialogue Line</div>
            <div class="arrow"></div>
            <div class="box">Highlight Active Speaker</div>
            <div class="arrow"></div>
            <div class="box">Start Typewriter Effect</div>
        </div>
    </div>

    <div class="arrow"></div>
    <div class="box">End of Dialogue?</div>
    <div class="arrow"></div>
    <div class="box">Stop Progression</div>

</div>

</body>
</html>
