<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #F4EFE9;
  --ink:   #1C1F30;
  --soft:  rgba(28,31,48,0.12);
  --nav-h: 72px;
}

html, body { height: 100%; }

body {
  background: var(--cream);
  font-family: 'Nunito', sans-serif;
  color: var(--ink);
}

/* ── NAV ─────────────────────────────────────────── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--nav-h);
  background: var(--cream);
  border-bottom: 1px solid var(--soft);
  display: flex;
  align-items: center;
  padding: 0 40px;
  gap: 0;
}

/* ── Logo ── */
.logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  user-select: none;
  flex-shrink: 0;
}

.mark {
  display: flex;
  flex-direction: column;
  align-items: stretch;
}

.heart {
  display: flex;
  align-items: flex-end;
  line-height: 1;
}

.d {
  display: inline-block;
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 42px;
  line-height: 0.82;
  color: var(--ink);
}

/* flipped 2 first — bump curves outward on the left */
.d-flip { transform: scaleX(-1); }

/* close the gap between the pair */
.d-flip { margin-right: -0.025em; }

.rule {
  height: 3px;
  background: var(--ink);
  border-radius: 2px;
  margin-top: 3px;
}

.wordmark {
  font-family: 'Nunito', sans-serif;
  font-weight: 300;
  font-size: 9.5px;
  letter-spacing: 0.52em;
  text-transform: uppercase;
  color: var(--ink);
  padding-left: 0.52em;
  margin-top: 5px;
}

/* ── Nav links ── */
.nav-links {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-links a {
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--ink);
  text-decoration: none;
  padding: 8px 18px;
  border-radius: 8px;
  letter-spacing: 0.02em;
  opacity: 0.7;
  transition: opacity 0.15s ease, background 0.15s ease;
}

.nav-links a:hover {
  opacity: 1;
  background: var(--soft);
}

.nav-links a.active {
  opacity: 1;
  font-weight: 700;
}

/* ── MAIN ─────────────────────────────────────────── */
main {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - var(--nav-h));
  padding: 60px 24px;
  text-align: center;
}

.hero-mark {
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  cursor: default;
}

.hero-mark .mark { display: flex; flex-direction: column; align-items: stretch; }
.hero-mark .heart { display: flex; align-items: flex-end; }

.hero-mark .d {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 180px;
  line-height: 0.82;
  color: var(--ink);
  display: inline-block;
}

.hero-mark .d-flip { transform: scaleX(-1); margin-right: -0.025em; }

.hero-mark .rule {
  height: 6px;
  background: var(--ink);
  border-radius: 3px;
  margin-top: 5px;
}

.hero-mark .wordmark {
  font-family: 'Nunito', sans-serif;
  font-weight: 300;
  font-size: 26px;
  letter-spacing: 0.55em;
  text-transform: uppercase;
  color: var(--ink);
  padding-left: 0.55em;
  margin-top: 16px;
}

.hero-mark .mark {
  transition: transform 0.15s ease;
  transform-origin: center bottom;
}
.hero-mark:hover .mark { animation: beat 0.55s ease forwards; }

@keyframes beat {
  0%   { transform: scale(1); }
  28%  { transform: scale(1.05); }
  55%  { transform: scale(0.975); }
  78%  { transform: scale(1.02); }
  100% { transform: scale(1); }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo" title="Maths">
    <div class="mark">
      <div class="heart">
        <!-- flipped 2 first, then regular -->
        <span class="d d-flip">2</span><span class="d">2</span>
      </div>
      <div class="rule"></div>
    </div>
    <div class="wordmark">Maths</div>
  </a>

  <div class="nav-links">
    <a href="page1.html">Page 1</a>
    <a href="page2.html">Page 2</a>
    <a href="page3.html">Page 3</a>
  </div>
</nav>

<main>
  <div class="hero-mark">
    <div class="mark">
      <div class="heart">
        <span class="d d-flip">2</span><span class="d">2</span>
      </div>
      <div class="rule"></div>
    </div>
    <div class="wordmark">Maths</div>
  </div>
</main>

</body>
</html>
