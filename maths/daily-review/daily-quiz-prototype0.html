<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Number Skills — Stage 4 Quick Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4EFE9;
    --card:#FFFFFF;
    --slate:#3D5A80;
    --forest:#4A7C59;
    --amber:#E89C2F;
    --terracotta:#C1614F;
    --ink:#2B2B2B;
    --ink-soft:#5B5B5B;
    --border:#E4DCD1;
    --font-body: 'Nunito Sans', system-ui, sans-serif;
    --font-display: 'Nunito', system-ui, sans-serif;
  }
  body.font-system{ --font-body: system-ui, sans-serif; --font-display: system-ui, sans-serif; }
  body.font-hyperlegible{ --font-body: 'Atkinson Hyperlegible', system-ui, sans-serif; --font-display: 'Atkinson Hyperlegible', system-ui, sans-serif; }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .app{
    width:100%;
    max-width:520px;
  }
  .top-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .eyebrow{
    font-family:var(--font-display);
    font-weight:800;
    font-size:0.78rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--slate);
  }
  .font-toggle{
    display:flex;
    gap:4px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:999px;
    padding:3px;
  }
  .font-toggle button{
    border:none;
    background:transparent;
    font-family:var(--font-body);
    font-size:0.72rem;
    padding:5px 10px;
    border-radius:999px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .font-toggle button.active{
    background:var(--slate);
    color:#fff;
  }

  h1{
    font-family:var(--font-display);
    font-size:1.7rem;
    font-weight:800;
    margin:0 0 4px;
  }
  .subtitle{
    color:var(--ink-soft);
    margin:0 0 20px;
    font-size:0.95rem;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:28px 26px;
    box-shadow:0 2px 10px rgba(60,50,40,0.06);
  }

  /* progress dots */
  .progress-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .progress-label{
    font-family:var(--font-display);
    font-weight:700;
    font-size:0.85rem;
    color:var(--ink-soft);
  }
  .dots{
    display:flex;
    gap:5px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--border);
  }
  .dot.done{ background:var(--forest); }
  .dot.current{ background:var(--slate); transform:scale(1.3); }

  /* operation badge */
  .op-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:var(--font-display);
    font-weight:700;
    font-size:0.72rem;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:5px 12px;
    border-radius:999px;
    color:#fff;
    margin-bottom:18px;
  }
  .op-add{ background:var(--forest); }
  .op-sub{ background:var(--terracotta); }
  .op-mul{ background:var(--slate); }
  .op-div{ background:var(--amber); }

  .equation{
    font-family:var(--font-display);
    font-weight:800;
    font-size:2.5rem;
    letter-spacing:-0.01em;
    margin:0 0 22px;
    line-height:1.15;
  }

  .answer-row{
    display:flex;
    gap:10px;
  }
  input[type="number"]{
    flex:1;
    font-family:var(--font-display);
    font-size:1.4rem;
    font-weight:700;
    padding:12px 16px;
    border-radius:12px;
    border:2px solid var(--border);
    background:var(--bg);
    color:var(--ink);
    outline:none;
    width:100%;
  }
  input[type="number"]:focus{
    border-color:var(--slate);
  }
  input[type="number"].correct{ border-color:var(--forest); background:#EEF6EF; }
  input[type="number"].incorrect{ border-color:var(--terracotta); background:#FBEEEC; }

  button.primary{
    font-family:var(--font-display);
    font-weight:700;
    font-size:1rem;
    padding:12px 22px;
    border-radius:12px;
    border:none;
    background:var(--slate);
    color:#fff;
    cursor:pointer;
    white-space:nowrap;
  }
  button.primary:disabled{
    background:#B9C3CF;
    cursor:not-allowed;
  }
  button.primary:hover:not(:disabled){
    filter:brightness(1.08);
  }

  .feedback{
    margin-top:16px;
    padding:12px 14px;
    border-radius:10px;
    font-weight:700;
    font-family:var(--font-display);
    font-size:0.95rem;
    display:none;
    align-items:center;
    gap:8px;
  }
  .feedback.show{ display:flex; }
  .feedback.correct{ background:#EEF6EF; color:var(--forest); }
  .feedback.incorrect{ background:#FBEEEC; color:var(--terracotta); }

  .next-row{
    margin-top:18px;
    text-align:right;
  }

  /* end screen */
  .end-screen{ text-align:center; }
  .score-circle{
    width:120px;height:120px;
    border-radius:50%;
    border:6px solid var(--forest);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    margin:0 auto 18px;
    font-family:var(--font-display);
  }
  .score-circle .num{ font-size:2.1rem; font-weight:800; line-height:1; }
  .score-circle .of{ font-size:0.75rem; color:var(--ink-soft); }
  .end-message{
    font-size:1.05rem;
    font-weight:700;
    font-family:var(--font-display);
    margin-bottom:6px;
  }
  .end-sub{
    color:var(--ink-soft);
    font-size:0.9rem;
    margin-bottom:22px;
  }
  .future-note{
    background:var(--bg);
    border:1px dashed var(--border);
    border-radius:12px;
    padding:12px 14px;
    font-size:0.82rem;
    color:var(--ink-soft);
    margin-bottom:22px;
    text-align:left;
  }
  .hidden{ display:none; }

  @media (max-width:480px){
    .equation{ font-size:2rem; }
    .card{ padding:22px 18px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="top-row">
    <span class="eyebrow">Stage 4 · Daily Number Skills</span>
    <div class="font-toggle" role="group" aria-label="Font preference">
      <button type="button" data-font="body" class="active">Aa</button>
      <button type="button" data-font="system">Aa</button>
      <button type="button" data-font="hyperlegible">Aa</button>
    </div>
  </div>

  <h1>Today's Quick Quiz</h1>
  <p class="subtitle">10 questions. Fresh numbers every time. Type the answer and hit check.</p>

  <div class="card">

    <!-- QUIZ VIEW -->
    <div id="quiz-view">
      <div class="progress-row">
        <span class="progress-label" id="progress-label">Question 1 of 10</span>
        <div class="dots" id="dots"></div>
      </div>

      <span class="op-badge" id="op-badge"></span>
      <p class="equation" id="equation"></p>

      <div class="answer-row">
        <input type="number" id="answer-input" placeholder="Your answer" inputmode="numeric" autocomplete="off">
        <button class="primary" id="check-btn">Check</button>
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="next-row hidden" id="next-row">
        <button class="primary" id="next-btn">Next question →</button>
      </div>
    </div>

    <!-- END VIEW -->
    <div id="end-view" class="end-screen hidden">
      <div class="score-circle">
        <span class="num" id="final-score">0/10</span>
        <span class="of">correct</span>
      </div>
      <p class="end-message" id="end-message">Nice work!</p>
      <p class="end-sub">Today's score has been saved.</p>
      <div class="future-note">📈 Coming soon: a graph of your daily average scores over time, right here on this screen.</div>
      <button class="primary" id="restart-btn">Play again</button>
    </div>

  </div>
</div>

<script>
(function(){
  const TOTAL_QUESTIONS = 10;
  const STORAGE_KEY = 'daily-quiz-scores';

  const opMeta = {
    add: { symbol: '+', label: 'Addition', badgeClass: 'op-add' },
    sub: { symbol: '−', label: 'Subtraction', badgeClass: 'op-sub' },
    mul: { symbol: '×', label: 'Multiplication', badgeClass: 'op-mul' },
    div: { symbol: '÷', label: 'Division', badgeClass: 'op-div' }
  };

  function randInt(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function generateQuestion(op){
    let a, b, answer, display;
    if(op === 'add'){
      a = randInt(10, 99);
      b = randInt(10, 99);
      answer = a + b;
      display = `${a} + ${b}`;
    } else if(op === 'sub'){
      a = randInt(20, 99);
      b = randInt(10, a - 1);
      answer = a - b;
      display = `${a} − ${b}`;
    } else if(op === 'mul'){
      a = randInt(2, 12);
      b = randInt(2, 12);
      answer = a * b;
      display = `${a} × ${b}`;
    } else { // div
      const quotient = randInt(2, 12);
      const divisor = randInt(2, 12);
      const dividend = quotient * divisor;
      answer = quotient;
      display = `${dividend} ÷ ${divisor}`;
    }
    return { op, display, answer };
  }

  function buildQuizSet(){
    const ops = ['add','sub','mul','div'];
    const pool = [];
    // ensure roughly even coverage across 10 questions
    for(let i = 0; i < TOTAL_QUESTIONS; i++){
      pool.push(ops[i % ops.length]);
    }
    // shuffle
    for(let i = pool.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.map(op => generateQuestion(op));
  }

  let questions = [];
  let currentIndex = 0;
  let score = 0;
  let answered = false;

  const equationEl = document.getElementById('equation');
  const opBadgeEl = document.getElementById('op-badge');
  const inputEl = document.getElementById('answer-input');
  const checkBtn = document.getElementById('check-btn');
  const nextBtn = document.getElementById('next-btn');
  const nextRow = document.getElementById('next-row');
  const feedbackEl = document.getElementById('feedback');
  const progressLabel = document.getElementById('progress-label');
  const dotsEl = document.getElementById('dots');
  const quizView = document.getElementById('quiz-view');
  const endView = document.getElementById('end-view');
  const finalScoreEl = document.getElementById('final-score');
  const endMessageEl = document.getElementById('end-message');
  const restartBtn = document.getElementById('restart-btn');

  function renderDots(){
    dotsEl.innerHTML = '';
    for(let i = 0; i < TOTAL_QUESTIONS; i++){
      const d = document.createElement('span');
      d.className = 'dot';
      if(i < currentIndex) d.classList.add('done');
      if(i === currentIndex) d.classList.add('current');
      dotsEl.appendChild(d);
    }
  }

  function renderQuestion(){
    answered = false;
    const q = questions[currentIndex];
    const meta = opMeta[q.op];

    opBadgeEl.textContent = meta.label;
    opBadgeEl.className = 'op-badge ' + meta.badgeClass;
    equationEl.textContent = `${q.display} = ?`;

    progressLabel.textContent = `Question ${currentIndex + 1} of ${TOTAL_QUESTIONS}`;
    renderDots();

    inputEl.value = '';
    inputEl.className = '';
    inputEl.disabled = false;
    inputEl.focus();

    checkBtn.disabled = false;
    checkBtn.classList.remove('hidden');
    nextRow.classList.add('hidden');
    feedbackEl.classList.remove('show', 'correct', 'incorrect');
    feedbackEl.textContent = '';
  }

  function checkAnswer(){
    if(answered) return;
    const q = questions[currentIndex];
    const userVal = inputEl.value.trim();
    if(userVal === ''){
      inputEl.focus();
      return;
    }
    const userAnswer = Number(userVal);
    const isCorrect = userAnswer === q.answer;
    answered = true;

    if(isCorrect){
      score++;
      inputEl.classList.add('correct');
      feedbackEl.className = 'feedback show correct';
      feedbackEl.textContent = '✓ Correct!';
    } else {
      inputEl.classList.add('incorrect');
      feedbackEl.className = 'feedback show incorrect';
      feedbackEl.textContent = `✗ Not quite — the answer was ${q.answer}`;
    }

    inputEl.disabled = true;
    checkBtn.disabled = true;
    nextRow.classList.remove('hidden');
    nextBtn.focus();
  }

  function nextQuestion(){
    currentIndex++;
    if(currentIndex >= TOTAL_QUESTIONS){
      showEndScreen();
    } else {
      renderQuestion();
    }
  }

  function saveScore(){
    const today = new Date();
    const dateStr = today.toISOString().slice(0, 10); // YYYY-MM-DD
    let history = [];
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) history = JSON.parse(raw);
    } catch(e){ history = []; }

    history.push({
      date: dateStr,
      score: score,
      total: TOTAL_QUESTIONS,
      timestamp: today.toISOString()
    });

    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    } catch(e){ /* storage unavailable — fail silently for prototype */ }
  }

  function showEndScreen(){
    quizView.classList.add('hidden');
    endView.classList.remove('hidden');
    finalScoreEl.textContent = `${score}/${TOTAL_QUESTIONS}`;

    let message = 'Nice work!';
    if(score === TOTAL_QUESTIONS) message = 'Perfect score! 🎉';
    else if(score >= 8) message = 'Excellent work!';
    else if(score >= 6) message = 'Solid effort!';
    else if(score >= 4) message = 'Good try — keep practising!';
    else message = 'Keep going — practice builds speed!';
    endMessageEl.textContent = message;

    saveScore();
  }

  function startQuiz(){
    questions = buildQuizSet();
    currentIndex = 0;
    score = 0;
    quizView.classList.remove('hidden');
    endView.classList.add('hidden');
    renderQuestion();
  }

  checkBtn.addEventListener('click', checkAnswer);
  inputEl.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      e.preventDefault();
      if(!answered) checkAnswer();
      else nextQuestion();
    }
  });
  nextBtn.addEventListener('click', nextQuestion);
  restartBtn.addEventListener('click', startQuiz);

  // font toggle
  document.querySelectorAll('.font-toggle button').forEach(btn => {
    btn.addEventListener('click', function(){
      document.querySelectorAll('.font-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.body.classList.remove('font-system', 'font-hyperlegible');
      const pref = btn.getAttribute('data-font');
      if(pref === 'system') document.body.classList.add('font-system');
      if(pref === 'hyperlegible') document.body.classList.add('font-hyperlegible');
    });
  });

  startQuiz();
})();
</script>

</body>
</html>
