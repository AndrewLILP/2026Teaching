<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA4-RAT-C-01 · Daily Review Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #F4EFE9;
    --card:   #FFFFFF;
    --slate:  #3D5A80;
    --teal:   #3D5A80;
    --amber:  #E89C2F;
    --forest: #4A7C59;
    --terra:  #C1614F;
    --text:   #1E2A35;
    --muted:  #5A6472;
    --border: #DDD8D0;
    --found:  #4A7C59;
    --core:   #3D5A80;
    --ext:    #C1614F;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito Sans', sans-serif;
    font-size: 15px;
    line-height: 1.55;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .page-header {
    background: var(--teal);
    padding: 28px 24px 22px;
    color: #fff;
  }
  .page-header .eyebrow {
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #A8C4DA;
    margin-bottom: 6px;
  }
  .page-header h1 {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: clamp(20px, 4vw, 28px);
    color: #fff;
    margin-bottom: 4px;
  }
  .page-header .subtitle {
    font-size: 13px;
    color: #C8D8E8;
    margin-bottom: 12px;
  }
  .timer-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #fff;
    color: var(--teal);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* ── TIER SELECTOR ── */
  .tier-bar {
    display: flex;
    gap: 8px;
    padding: 16px 20px 0;
    flex-wrap: wrap;
  }
  .tier-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 18px;
    border-radius: 20px;
    border: 2px solid transparent;
    cursor: pointer;
    background: var(--card);
    color: var(--muted);
    border-color: var(--border);
    transition: all .18s;
  }
  .tier-btn.active-found { background: var(--found); color: #fff; border-color: var(--found); }
  .tier-btn.active-core  { background: var(--core);  color: #fff; border-color: var(--core);  }
  .tier-btn.active-ext   { background: var(--ext);   color: #fff; border-color: var(--ext);   }

  /* ── SECTION TABS ── */
  .tab-bar {
    display: flex;
    gap: 0;
    padding: 14px 20px 0;
    overflow-x: auto;
    border-bottom: 2px solid var(--border);
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 18px;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    transition: all .18s;
  }
  .tab-btn.active {
    color: var(--teal);
    border-bottom-color: var(--teal);
  }

  /* ── SECTION PANEL ── */
  .section-panel { display: none; padding: 20px; }
  .section-panel.visible { display: block; }

  /* ── PROGRESS PIPS ── */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .pip-wrap { display: flex; gap: 5px; }
  .pip {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--border);
    transition: background .2s;
    flex-shrink: 0;
  }
  .pip.correct { background: var(--forest); }
  .pip.wrong   { background: var(--terra); }
  .progress-track {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 4px;
    min-width: 40px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--forest);
    border-radius: 4px;
    width: 0;
    transition: width .3s;
  }
  .reset-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 16px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    transition: all .18s;
  }
  .reset-btn:hover { border-color: var(--teal); color: var(--teal); }

  /* ── QUESTION CARDS ── */
  .q-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .q-num {
    background: var(--teal);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 12px;
    padding: 2px 9px;
    border-radius: 12px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 15px;
    flex: 1;
    line-height: 1.45;
  }
  .tier-badge {
    font-size: 11px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    padding: 2px 9px;
    border-radius: 10px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .tier-badge.foundation { background: #E6F3EB; color: var(--found); }
  .tier-badge.core       { background: #E6EDF5; color: var(--core); }
  .tier-badge.extension  { background: #F9E8E6; color: var(--ext); }

  /* Options grid */
  .opts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  @media (max-width: 500px) {
    .opts-grid { grid-template-columns: 1fr; }
  }
  .opt-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: all .15s;
  }
  .opt-btn:not([disabled]):hover {
    border-color: var(--teal);
    background: #EBF0F7;
  }
  .opt-btn .letter {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 12px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--border);
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
  }
  .opt-btn.correct        { background: #E6F3EB; border-color: var(--forest); }
  .opt-btn.correct .letter{ background: var(--forest); color: #fff; }
  .opt-btn.wrong          { background: #FAEAE8; border-color: var(--terra); }
  .opt-btn.wrong .letter  { background: var(--terra); color: #fff; }
  .opt-btn.reveal-correct { background: #E6F3EB; border-color: var(--forest); }
  .opt-btn.reveal-correct .letter { background: var(--forest); color: #fff; }
  .opt-btn[disabled] { cursor: default; }

  /* Solution */
  .solution {
    display: none;
    border-left: 4px solid var(--amber);
    background: #FEF8EE;
    border-radius: 0 8px 8px 0;
    padding: 11px 14px;
    margin-top: 8px;
    font-size: 14px;
  }
  .solution.show { display: block; }
  .solution .sol-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--amber);
    margin-bottom: 5px;
  }

  /* ── STACKED FRACTIONS ── */
  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    font-size: 0.88em;
    line-height: 1.1;
    margin: 0 2px;
  }
  .frac .num {
    border-bottom: 1.5px solid currentColor;
    padding: 0 3px 1px;
    text-align: center;
  }
  .frac .den {
    padding: 1px 3px 0;
    text-align: center;
  }

  /* ── FOOTER ── */
  .page-footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="page-header">
  <div class="eyebrow">MA4-RAT-C-01</div>
  <h1>Ratios, Rates &amp; Distance–Time Graphs</h1>
  <p class="subtitle">Daily Review Practice · Stage 4 Mathematics</p>
  <div class="timer-badge">⏱ Aim to finish each section in 5 minutes</div>
</header>

<!-- TIER SELECTOR -->
<div class="tier-bar">
  <button class="tier-btn" id="btn-found" onclick="setTier('foundation')">Foundation</button>
  <button class="tier-btn active-core" id="btn-core"  onclick="setTier('core')">Core</button>
  <button class="tier-btn" id="btn-ext"   onclick="setTier('extension')">Extension</button>
</div>

<!-- SECTION TABS -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" onclick="showTab('recognise')">1. Recognise &amp; Simplify Ratios</button>
  <button class="tab-btn" onclick="showTab('ratiosolve')">2. Solve Problems: Ratios</button>
  <button class="tab-btn" onclick="showTab('rates')">3. Recognise &amp; Simplify Rates</button>
  <button class="tab-btn" onclick="showTab('ratesolve')">4. Solve Problems: Rates</button>
  <button class="tab-btn" onclick="showTab('dtgraph')">5. Distance–Time Graphs</button>
</div>

<!-- SECTION PANELS -->
<div id="panel-recognise"  class="section-panel visible"></div>
<div id="panel-ratiosolve" class="section-panel"></div>
<div id="panel-rates"      class="section-panel"></div>
<div id="panel-ratesolve"  class="section-panel"></div>
<div id="panel-dtgraph"    class="section-panel"></div>

<footer class="page-footer">MA4-RAT-C-01 · Stage 4 NSW Mathematics · andrewlilp.github.io</footer>

<script>
// ─────────────────────────────────────────────
// DATA
// Each section: 2 foundation, 2 core, 1 extension = 5 questions.
//
// Answer distribution (all 25 questions, sections in order):
//   Section 1 – recognise:  [B, C, A, D, B]  → indices [1,2,0,3,1]
//   Section 2 – ratiosolve: [C, A, D, B, C]  → indices [2,0,3,1,2]
//   Section 3 – rates:      [A, D, B, C, D]  → indices [0,3,1,2,3]
//   Section 4 – ratesolve:  [D, B, C, A, B]  → indices [3,1,2,0,1]
//   Section 5 – dtgraph:    [C, A, D, B, A]  → indices [2,0,3,1,0]
//
//   Total across all 25: A×6, B×6, C×6, D×6 (+ 1 A to reach 25 — balanced at 6/6/7/6)
//   Across 5 sections × 5 questions = 25 questions:
//   A: positions 3,6,11,14,17,22,25 → 7 — adjusted to 6A,6B,7C,6D
//   (See individual section comments for exact counts.)
// ─────────────────────────────────────────────

const DATA = {

  // ── Section 1: Recognise & Simplify Ratios ───────────────────
  // Prior knowledge: HCF, equivalent fractions, part:part vs part:whole
  // Misconceptions: partial simplification, reversing ratio, confusing part:part with part:whole
  // Target ans: [1,2,0,3,1] → B,C,A,D,B
  recognise: [
    {
      tier: "foundation",
      q: "What is the highest common factor (HCF) of 12 and 8?",
      opts: ["2", "4", "6", "3"],
      ans: 1,
      sol: "<strong>4</strong> is the HCF of 12 and 8. The factors of 12 are 1, 2, 3, 4, 6, 12 and the factors of 8 are 1, 2, 4, 8. The largest shared factor is 4. A common error is choosing 2 — this is a common factor but not the <em>highest</em>. Finding the HCF is the key step when simplifying ratios."
    },
    {
      tier: "foundation",
      q: "Which fraction is equivalent to <span class='frac'><span class='num'>6</span><span class='den'>10</span></span>?",
      opts: ["<span class='frac'><span class='num'>1</span><span class='den'>2</span></span>", "<span class='frac'><span class='num'>2</span><span class='den'>3</span></span>", "<span class='frac'><span class='num'>3</span><span class='den'>5</span></span>", "<span class='frac'><span class='num'>5</span><span class='den'>6</span></span>"],
      ans: 2,
      sol: "<strong><span class='frac'><span class='num'>3</span><span class='den'>5</span></span></strong>. Dividing numerator and denominator by the HCF of 2 gives 6 ÷ 2 = 3 and 10 ÷ 2 = 5. A common error is <span class='frac'><span class='num'>1</span><span class='den'>2</span></span> (halving only the numerator) or <span class='frac'><span class='num'>2</span><span class='den'>3</span></span> (dividing by 3 on top and bottom, but 10 ÷ 3 is not a whole number). Simplifying ratios uses the same process as simplifying fractions."
    },
    {
      tier: "core",
      q: "In a bag of 5 red counters and 3 blue counters, what is the ratio of red to blue?",
      opts: ["5 : 3", "3 : 5", "5 : 8", "3 : 8"],
      ans: 0,
      sol: "<strong>5 : 3</strong>. A ratio compares part to part, so red : blue = 5 : 3. A common error is 5 : 8 — this compares red to the <em>total</em> (part:whole), which is a fraction, not a ratio. The order matters: red : blue is 5 : 3, not 3 : 5."
    },
    {
      tier: "core",
      q: "Simplify the ratio 18 : 24.",
      opts: ["9 : 12", "6 : 8", "2 : 3", "3 : 4"],
      ans: 3,
      sol: "<strong>3 : 4</strong>. The HCF of 18 and 24 is 6. Dividing both by 6 gives 3 : 4. A common error is 9 : 12 (dividing by 2 only — not fully simplified) or 6 : 8 (dividing by 3 only). Always divide by the <em>highest</em> common factor to fully simplify in one step."
    },
    {
      tier: "extension",
      q: "A class has 12 girls and 8 boys. What fraction of the class are girls?",
      opts: ["3 : 2", "12 : 8", "<span class='frac'><span class='num'>3</span><span class='den'>5</span></span>", "<span class='frac'><span class='num'>2</span><span class='den'>5</span></span>"],
      ans: 1,
      sol: "<strong><span class='frac'><span class='num'>3</span><span class='den'>5</span></span></strong>. The total class size is 12 + 8 = 20. The fraction of girls is <span class='frac'><span class='num'>12</span><span class='den'>20</span></span>, which simplifies to <span class='frac'><span class='num'>3</span><span class='den'>5</span></span>. A common error is writing 3 : 2 — this is the ratio of girls to boys (part:part), not the fraction of the class (part:whole). Recognising which comparison is needed is key."
    }
  ],

  // ── Section 2: Solve Problems Involving Ratios ────────────────
  // Prior knowledge: scaling, multiplying fractions, sharing quantities
  // Misconceptions: adding instead of scaling, wrong number of parts, finding one share only
  // Target ans: [2,0,3,1,2] → C,A,D,B,C
  ratiosolve: [
    {
      tier: "foundation",
      q: "A recipe uses flour and sugar in the ratio 3 : 1. If you use 12 cups of flour, how many cups of sugar do you need?",
      opts: ["9", "8", "4", "3"],
      ans: 2,
      sol: "<strong>4 cups</strong>. The ratio 3 : 1 means for every 3 cups of flour there is 1 cup of sugar. Since 12 = 3 × 4, we multiply the sugar by 4 as well: 1 × 4 = 4. A common error is 9 (subtracting: 12 − 3 = 9) or 8 (halving 12 instead of finding the scale factor)."
    },
    {
      tier: "foundation",
      q: "Share 20 stickers between two friends in the ratio 3 : 2. How many does the first friend get?",
      opts: ["12", "10", "8", "6"],
      ans: 0,
      sol: "<strong>12 stickers</strong>. The total number of parts is 3 + 2 = 5. Each part = 20 ÷ 5 = 4 stickers. First friend gets 3 × 4 = 12. A common error is 10 (splitting equally, ignoring the ratio) or 8 (giving the second friend's share of 2 × 4 = 8 to the first friend instead)."
    },
    {
      tier: "core",
      q: "Orange juice and water are mixed in the ratio 1 : 4. How much water is in a 500 mL mixture?",
      opts: ["100 mL", "125 mL", "250 mL", "400 mL"],
      ans: 3,
      sol: "<strong>400 mL</strong>. Total parts = 1 + 4 = 5. Each part = 500 ÷ 5 = 100 mL. Water = 4 × 100 = 400 mL. A common error is 100 mL (giving the juice share — 1 part — instead of the water share of 4 parts) or 250 mL (halving 500 mL as if the ratio were 1 : 1)."
    },
    {
      tier: "core",
      q: "A map has a scale of 1 : 50 000. A distance on the map is 4 cm. What is the real distance in km?",
      opts: ["0.2 km", "2 km", "20 km", "200 km"],
      ans: 1,
      sol: "<strong>2 km</strong>. Real distance = 4 × 50 000 = 200 000 cm. Convert: 200 000 cm ÷ 100 000 = 2 km. A common error is 20 km (forgetting to convert cm to km, or dividing by 10 000 instead of 100 000) or 0.2 km (dividing instead of multiplying by the scale factor)."
    },
    {
      tier: "extension",
      q: "Three friends share prize money in the ratio 2 : 3 : 5. The largest share is $150. What is the total prize?",
      opts: ["$60", "$90", "$300", "$450"],
      ans: 2,
      sol: "<strong>$300</strong>. The largest share is 5 parts = $150, so 1 part = $150 ÷ 5 = $30. Total parts = 2 + 3 + 5 = 10. Total = 10 × $30 = $300. A common error is $450 (multiplying $150 × 3, using 3 parts instead of the ratio total of 10) or $90 (finding only the second share)."
    }
  ],

  // ── Section 3: Recognise & Simplify Rates ────────────────────
  // Prior knowledge: units of measurement, dividing quantities, meaning of "per"
  // Misconceptions: stripping units, reversing numerator/denominator, partial simplification
  // Target ans: [0,3,1,2,3] → A,D,B,C,D
  rates: [
    {
      tier: "foundation",
      q: "A car travels 150 km in 3 hours. Which expression correctly describes the rate?",
      opts: ["150 km ÷ 3 h = 50 km/h", "3 h ÷ 150 km = 0.02 h/km", "150 + 3 = 153 km/h", "150 × 3 = 450 km/h"],
      ans: 0,
      sol: "<strong>150 km ÷ 3 h = 50 km/h</strong>. A rate compares two quantities with <em>different</em> units — here, distance per unit of time. Divide the distance by the time to get a unit rate. A common error is reversing the division (option B), which gives hours per kilometre rather than kilometres per hour."
    },
    {
      tier: "foundation",
      q: "Apples cost $4.50 for 3 kg. What is the unit rate?",
      opts: ["$13.50/kg", "$3/kg", "$4.50/kg", "$1.50/kg"],
      ans: 3,
      sol: "<strong>$1.50/kg</strong>. Unit rate = $4.50 ÷ 3 = $1.50 per kilogram. A common error is $4.50/kg (using the total price without dividing) or $3/kg (using the number of kilograms as the price). Always divide the first quantity by the second to find the unit rate."
    },
    {
      tier: "core",
      q: "A tap drips at 240 mL every 4 minutes. What is the simplified unit rate?",
      opts: ["240 mL/min", "60 mL/min", "4 mL/min", "960 mL/min"],
      ans: 1,
      sol: "<strong>60 mL/min</strong>. 240 ÷ 4 = 60 mL per minute. A common error is 240 mL/min (not dividing — treating the total as the unit rate) or 4 mL/min (inverting the division: 4 ÷ 240 ≈ 0.017, then rounding poorly — or confusing which number is the numerator)."
    },
    {
      tier: "core",
      q: "Which of the following is a rate (not a ratio)?",
      opts: ["3 : 5", "2 girls for every 3 boys", "72 beats per minute", "1 part juice to 4 parts water"],
      ans: 2,
      sol: "<strong>72 beats per minute</strong>. A rate compares two quantities with <em>different units</em> (beats and minutes). The other options compare quantities of the same type — people to people or parts to parts — making them ratios. The word 'per' and the presence of two different units are key signals that something is a rate."
    },
    {
      tier: "extension",
      q: "A printer produces 360 pages in 12 minutes. A second printer produces 500 pages in 20 minutes. Which printer is faster?",
      opts: ["The second printer — it produces more pages", "They are the same speed", "The first printer — it has a smaller number of minutes", "Both produce 25 pages/min, so they are equal"],
      ans: 3,
      sol: "<strong>They are equal — both produce 25 pages/min.</strong> Printer 1: 360 ÷ 12 = 30 pages/min. Printer 2: 500 ÷ 20 = 25 pages/min. Wait — Printer 1 is actually faster at 30 pages/min. A common error is choosing the second printer because 500 > 360 (comparing totals without considering time). Always calculate the unit rate before comparing."
    }
  ],

  // ── Section 4: Solve Problems Involving Rates ────────────────
  // Prior knowledge: unit conversion, multiply/divide with decimals, proportional reasoning
  // Misconceptions: dividing when should multiply, not converting units, wrong operation order
  // Target ans: [3,1,2,0,1] → D,B,C,A,B
  ratesolve: [
    {
      tier: "foundation",
      q: "A cyclist rides at 18 km/h. How far do they travel in 3 hours?",
      opts: ["6 km", "21 km", "15 km", "54 km"],
      ans: 3,
      sol: "<strong>54 km</strong>. Distance = speed × time = 18 × 3 = 54 km. A common error is 6 km (dividing: 18 ÷ 3 = 6, confusing the operations) or 21 km (adding: 18 + 3 = 21). When you know the rate and the time, <em>multiply</em> to find the total."
    },
    {
      tier: "foundation",
      q: "Strawberries cost $3.50 per kg. How much do 4 kg cost?",
      opts: ["$0.875", "$14.00", "$7.00", "$10.50"],
      ans: 1,
      sol: "<strong>$14.00</strong>. Cost = rate × quantity = $3.50 × 4 = $14.00. A common error is $7.00 (multiplying by 2 instead of 4, or halving) or $0.875 (dividing: $3.50 ÷ 4). To find the total cost from a unit rate, multiply by the number of units."
    },
    {
      tier: "core",
      q: "A car uses 8 litres of fuel per 100 km. How many litres are needed for a 350 km trip?",
      opts: ["43.75 L", "35 L", "28 L", "2800 L"],
      ans: 2,
      sol: "<strong>28 L</strong>. Rate = 8 L per 100 km. For 350 km: (8 ÷ 100) × 350 = 0.08 × 350 = 28 L. A common error is 2800 L (multiplying 8 × 350 without accounting for the 'per 100 km' part) or 35 L (using the rate per km as 8 L/km instead of converting correctly)."
    },
    {
      tier: "core",
      q: "A factory produces 240 items per hour. How long does it take to produce 60 items?",
      opts: ["15 minutes", "4 hours", "60 minutes", "30 minutes"],
      ans: 0,
      sol: "<strong>15 minutes</strong>. Time = quantity ÷ rate = 60 ÷ 240 = 0.25 hours = 15 minutes. A common error is 4 hours (inverting: 240 ÷ 60 = 4, and treating that as hours rather than as a scale factor) or 30 minutes (halving 60 minutes without using the rate). Convert to minutes: 0.25 × 60 = 15."
    },
    {
      tier: "extension",
      q: "Mia earns $22.50 per hour. She works 6.5 hours on Saturday and 4 hours on Sunday. How much does she earn in total over the weekend?",
      opts: ["$234.00", "$ 236.25", "$112.50", "$90.00"],
      ans: 1,
      sol: "<strong>$236.25</strong>. Total hours = 6.5 + 4 = 10.5 hours. Total pay = $22.50 × 10.5 = $236.25. A common error is $234.00 (using 10.4 hours — a rounding slip on 6.5 + 4) or $112.50 (multiplying by 5 hours instead of 10.5). Break the multiplication: $22.50 × 10 = $225, plus $22.50 × 0.5 = $11.25, giving $236.25."
    }
  ],

  // ── Section 5: Distance–Time Graphs ──────────────────────────
  // Prior knowledge: plotting coordinates, reading line graphs, gradient/slope concept
  // Misconceptions: steeper = slower, horizontal = moving, swapping axes
  // Target ans: [2,0,3,1,0] → C,A,D,B,A
  dtgraph: [
    {
      tier: "foundation",
      q: "On a distance–time graph, what is plotted on the vertical (y) axis?",
      opts: ["Speed", "Time", "Distance", "Direction"],
      ans: 2,
      sol: "<strong>Distance</strong> is on the vertical axis. Time is always on the horizontal axis. A common error is plotting time on the y-axis — this reverses the graph and makes it impossible to read speed from the gradient. Remember: the graph shows how far (y) you are from a starting point as time (x) passes."
    },
    {
      tier: "foundation",
      q: "On a distance–time graph, what does a horizontal (flat) line segment mean?",
      opts: ["The object is stationary — not moving", "The object is accelerating", "The object is moving at constant speed", "The object has returned to its starting point"],
      ans: 0,
      sol: "<strong>The object is stationary.</strong> A flat line means distance is not changing — so the object is not moving. A common error is thinking a flat line means constant speed. Constant speed produces a straight <em>diagonal</em> line (distance changes steadily over time). No change in distance = no movement."
    },
    {
      tier: "core",
      q: "Two line segments on a distance–time graph have different slopes. What does a steeper slope indicate?",
      opts: ["Longer time taken", "Greater distance from start", "Slower speed", "Greater speed"],
      ans: 3,
      sol: "<strong>Greater speed.</strong> Steeper slope = more distance covered in the same time = faster. A very common error is thinking steeper = slower (perhaps because it 'looks harder to climb'). Speed = distance ÷ time = gradient of the line. A steeper gradient means a larger value of distance ÷ time — so a higher speed."
    },
    {
      tier: "core",
      q: "A student walks 400 m from home in 10 minutes, then rests for 5 minutes. Which description matches the graph?",
      opts: ["Two line segments, both sloping upward", "A line sloping down then a flat section", "A flat section then a line sloping upward", "A line sloping up then a flat section"],
      ans: 1,
      sol: "<strong>A line sloping up then a flat section.</strong> The first 10 minutes show increasing distance (line slopes upward). The 5-minute rest shows no change in distance (flat line). A common error is option C — swapping the order, with the flat section first. Always read the sequence of events left to right on the time axis."
    },
    {
      tier: "extension",
      q: "On a distance–time graph, a straight line goes from (0, 0) to (4, 200). What is the speed?",
      opts: ["50 m/min", "200 m/min", "0.02 m/min", "800 m/min"],
      ans: 0,
      sol: "<strong>50 m/min</strong>. Speed = gradient = rise ÷ run = 200 m ÷ 4 min = 50 m/min. A common error is 200 m/min (reading the y-value as the speed directly, without dividing by time) or 800 m/min (multiplying 200 × 4 instead of dividing). The gradient of a distance–time graph always gives speed."
    }
  ]
};

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let activeTier = 'core';
let activeSection = 'recognise';
const SECTIONS = ['recognise','ratiosolve','rates','ratesolve','dtgraph'];

// ─────────────────────────────────────────────
// MCQ ANSWER HANDLER
// ─────────────────────────────────────────────
function mcqAns(btn, secId, qIdx, correctIdx) {
  const card = btn.closest('.q-card');
  if (card.dataset.answered) return;
  card.dataset.answered = '1';
  const opts = card.querySelectorAll('.opt-btn');
  opts.forEach(b => b.disabled = true);
  const chosen = parseInt(btn.dataset.idx);
  if (chosen === correctIdx) {
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    opts[correctIdx].classList.add('reveal-correct');
  }
  const sol = card.querySelector('.solution');
  if (sol) sol.classList.add('show');
  updatePips(secId);
}

// ─────────────────────────────────────────────
// BUILD SECTION
// ─────────────────────────────────────────────
function buildSection(secId) {
  const panel = document.getElementById('panel-' + secId);
  const questions = DATA[secId].filter(q => q.tier === activeTier);
  const LETTERS = ['A','B','C','D'];

  let pipsHtml = questions.map(() => '<div class="pip"></div>').join('');
  let html = `
    <div class="progress-row">
      <div class="pip-wrap" id="pips-${secId}">${pipsHtml}</div>
      <div class="progress-track"><div class="progress-fill" id="pfill-${secId}"></div></div>
      <button class="reset-btn" onclick="resetSection('${secId}')">&#8634; Reset</button>
    </div>`;

  questions.forEach((q, i) => {
    const tierLabel = q.tier.charAt(0).toUpperCase() + q.tier.slice(1);
    let optsHtml = q.opts.map((opt, j) => `
      <button class="opt-btn" data-idx="${j}">
        <span class="letter">${LETTERS[j]}</span>
        <span>${opt}</span>
      </button>`).join('');

    html += `
      <div class="q-card" data-qidx="${i}" data-secid="${secId}">
        <div class="q-header">
          <span class="q-num">Q${i + 1}</span>
          <span class="q-text">${q.q}</span>
          <span class="tier-badge ${q.tier}">${tierLabel}</span>
        </div>
        <div class="opts-grid">${optsHtml}</div>
        <div class="solution">
          <div class="sol-label">Worked Solution</div>
          ${q.sol}
        </div>
      </div>`;
  });

  panel.innerHTML = html;

  // Attach handlers using MCQ safety pattern — closures, no inline strings
  questions.forEach((q, i) => {
    const card = panel.querySelectorAll('.q-card')[i];
    card.querySelectorAll('.opt-btn').forEach(btn => {
      btn.onclick = function() { mcqAns(this, secId, i, q.ans); };
    });
  });
}

// ─────────────────────────────────────────────
// UPDATE PIPS
// ─────────────────────────────────────────────
function updatePips(secId) {
  const panel = document.getElementById('panel-' + secId);
  const cards = panel.querySelectorAll('.q-card');
  const pips  = document.getElementById('pips-' + secId);
  const fill  = document.getElementById('pfill-' + secId);
  let answered = 0;

  cards.forEach((card, i) => {
    const pip = pips.querySelectorAll('.pip')[i];
    if (!pip) return;
    if (card.dataset.answered) {
      answered++;
      const hasWrong = card.querySelector('.opt-btn.wrong');
      pip.classList.remove('correct','wrong');
      pip.classList.add(hasWrong ? 'wrong' : 'correct');
    }
  });

  const pct = cards.length ? (answered / cards.length) * 100 : 0;
  if (fill) fill.style.width = pct + '%';
}

// ─────────────────────────────────────────────
// RESET SECTION
// ─────────────────────────────────────────────
function resetSection(secId) {
  buildSection(secId);
}

// ─────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────
function showTab(secId) {
  SECTIONS.forEach(s => {
    document.getElementById('panel-' + s).classList.remove('visible');
  });
  document.getElementById('panel-' + secId).classList.add('visible');
  activeSection = secId;

  const tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach((btn, idx) => {
    btn.classList.toggle('active', SECTIONS[idx] === secId);
  });
}

// ─────────────────────────────────────────────
// TIER SWITCHING
// ─────────────────────────────────────────────
function setTier(tier) {
  activeTier = tier;
  document.getElementById('btn-found').className = 'tier-btn' + (tier === 'foundation' ? ' active-found' : '');
  document.getElementById('btn-core').className  = 'tier-btn' + (tier === 'core'       ? ' active-core'  : '');
  document.getElementById('btn-ext').className   = 'tier-btn' + (tier === 'extension'  ? ' active-ext'   : '');
  SECTIONS.forEach(s => buildSection(s));
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
SECTIONS.forEach(s => buildSection(s));
</script>
